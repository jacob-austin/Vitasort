name: Daily price refresh & deploy

on:
  schedule:
    - cron: "17 9 * * *"   # daily 09:17 UTC (off the hour to avoid cron congestion)
  push:
    branches: [main]
  workflow_dispatch:        # manual run button

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Fetch prices & build data
        env:
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
        run: python3 pipeline/build.py

      - name: Commit price history & data
        run: |
          git config user.name "vitasort-bot"
          git config user.email "actions@users.noreply.github.com"
          git add pipeline/prices.db site/data/products.json
          git diff --staged --quiet || git commit -m "chore: daily price refresh"
          git push

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with: { path: site }

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
