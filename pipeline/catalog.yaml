# VitaSort curated catalog.
# Nutrition facts are entered by hand once (scraping labels is unreliable);
# the pipeline automates PRICES and product IMAGES (schema.org / PA-API);
# an optional per-product `image:` field overrides the fetched URL. seed_price is used until a live price
# is fetched, then the freshest snapshot in the DB wins.
#
# Category config drives the frontend: columns, filters, toggles, value units.
# active_grams per serving is the denominator for price-per-active-gram.

categories:
  protein:
    label: Protein Powder
    valueUnit: /g protein
    valueHeader: $/g protein
    valueDecimals: 3
    columns:
    - Source
    - Complete
    - Protein
    filter:
      allLabel: All sources
      field: source
      options:
      - Whey
      - Pea
      - Casein
      - Blend
    toggles:
    - label: Complete protein
      field: complete
  creatine:
    label: Creatine
    valueUnit: /g
    valueHeader: $/g
    valueDecimals: 3
    columns:
    - Form
    - Micronized
    - Dose
    filter:
      allLabel: All forms
      field: form
      options:
      - Powder
      - Pill
      - Gummy
  preworkout:
    label: Pre-Workout
    valueUnit: /serving
    valueHeader: $/serving
    valueDecimals: 2
    columns:
    - Caffeine
    - Form
    - Servings
    filter:
      allLabel: All caffeine levels
      field: caffeineBucket
      options:
      - Under 200 mg
      - 200–300 mg
      - 300+ mg
    toggles:
    - label: Stim-free option
      field: stimFree
  omega3:
    label: Omega-3
    valueUnit: /g EPA+DHA
    valueHeader: $/g omega
    valueDecimals: 2
    columns:
    - Form
    - EPA+DHA
    - Servings
    filter:
      allLabel: All forms
      field: form
      options:
      - Softgel
      - Liquid

